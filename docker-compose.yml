version: "3.8"

services:
  redis:
    image: redis:7.0-alpine
    container_name: redis
    restart: always

    ports:
      - "${SPRING_REDIS_PORT}:6379"

    volumes:
      - redis_data:/data

  mysql-db:
    image: mysql:8.0
    container_name: strong-memory-mysql

    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}

    volumes:
      - ./sql:/docker-entrypoint-initdb.d

    ports:
      - "${MYSQL_PORT}:3306"

    restart: always

    healthcheck:
      test: ["CMD-SHELL", "mysql -uroot -p${MYSQL_ROOT_PASSWORD} -e 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  backend-api:
    image: renanteles/strongmemoryapi:1.0
    container_name: strong-memory-api

    ports:
      - "${API_PORT}:8080"

    restart: always

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=utf8&connectionCollation=utf8mb4_unicode_ci
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

    depends_on:
      mysql-db:
        condition: service_healthy
      redis:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 120s

  frontend-web:
    image: renanteles/strongmemorywebapp:1.0
    container_name: strong-memory-frontend

    ports:
      - "${FRONTEND_PORT}:80"

    restart: always

    environment:
      API_URL: ${API_URL}

    depends_on:
      backend-api:
        condition: service_healthy

volumes:
  redis_data:
